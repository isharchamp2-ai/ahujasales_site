services:
  - type: web
    name: ahujasales-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: FAST2SMS_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: isharchamp2-ai/ahujasales_site
      - key: GITHUB_BRANCH
        value: main
      - key: PORT
        value: 10000
